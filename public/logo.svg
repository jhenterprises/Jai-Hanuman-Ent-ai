<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="j-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D22B2B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="h-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a4e7a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a2a4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#101a30;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="2" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- J Component -->
  <path d="M120,80 L280,80 L280,140 L210,140 L210,210 Q210,250 170,250 L100,250 L100,190 L150,190 Q160,190 160,180 L160,140 L120,140 Z" fill="url(#j-grad)" filter="url(#shadow)"/>
  
  <!-- H Component -->
  <path d="M300,80 L360,80 L360,145 L460,145 L460,80 L520,80 L520,250 L460,250 L460,185 L360,185 L360,250 L300,250 Z" fill="url(#h-grad)" filter="url(#shadow)"/>
  
  <!-- Stylized Decorative Element (Mimicking the Hanuman-like profile in J) -->
  <path d="M110,95 Q90,95 80,120 Q70,145 90,165 Q110,185 130,175 Q150,165 145,140 Q140,115 110,95 Z" fill="none" stroke="#FF8C00" stroke-width="2" opacity="0.6"/>
  <path d="M100,110 Q90,110 85,125 Q80,140 95,150" fill="none" stroke="#FF8C00" stroke-width="1.5" opacity="0.8"/>

  <!-- Text: DIGITAL SEVA KENDRA -->
  <text x="80" y="320" font-family="Arial, sans-serif" font-size="64" font-weight="900" style="letter-spacing: 1px;">
    <tspan fill="#FF4500">DIGITAL SEVA</tspan>
    <tspan x="540" fill="#1a2a4e">KENDRA</tspan>
  </text>
  
  <!-- Background subtle glow -->
  <circle cx="400" cy="200" r="300" fill="white" opacity="0.5" filter="url(#shadow)"/>
</svg>
