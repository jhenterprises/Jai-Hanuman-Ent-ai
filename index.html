<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JH Digital Seva Kendra</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('theme');
          var isLight = savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches);
          if (isLight) {
            document.documentElement.classList.add('light');
          } else {
            document.documentElement.classList.add('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <div id="error-display" style="color: red; position: fixed; top: 0; left: 0; background: white; z-index: 9999;"></div>
    <script>
      window.addEventListener('error', function(e) {
        document.getElementById('error-display').innerText += e.message + '\n';
      });
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('error-display').innerText += e.reason + '\n';
      });
      // Unregister any stale service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for(let registration of registrations) {
            registration.unregister();
          }
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
